<!DOCTYPE html>
<html>
    <head>
        <title>Css js</title>
    </head>
    <body>
        <div id="cc">
            <p id="gr">welcome to fight club</p>
        </div>
        <button onclick="clogic()">change color</button>
        <style>
            .t{
                transition: 2s;
            }
            div{
                width: 300px;
                height: 100px;
                background-color:antiquewhite;
                display: inline-block;
            }
            p{
                text-align: center;
                padding-top: 25px;
                font-size: large;
                font-family: 'Times New Roman', Times, serif;
                font-style: bold;
            }
        </style>

        <script>
            var box=document.getElementById("cc")
            function clogic(){
                box.style.backgroundColor="pink"
                box.setAttribute("class","t")
            }
        </script>
    </body>
</html>
