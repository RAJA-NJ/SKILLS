<!DOCTYPE html>
<html>
    <head>
        <title>color button</title>
    </head>
    <body>
        <button id="btn" onclick="clogic()">change</button>
        <script>
            var bh=document.getElementById("btn")
            function clogic(){
                bh.style.backgroundColor="black"
                bh.style.color="white"
            }
        </script>
    </body>
</html>
